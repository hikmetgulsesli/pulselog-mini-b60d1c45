<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Record Editor - PulseLog Mini</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#2d3133",
                    "secondary": "#515f74",
                    "on-secondary-fixed-variant": "#3a485c",
                    "on-tertiary-fixed": "#0b1c30",
                    "on-primary-fixed": "#131b2e",
                    "surface-container-low": "#f2f4f6",
                    "error": "#ba1a1a",
                    "on-primary": "#ffffff",
                    "outline": "#76777d",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#38485d",
                    "primary-fixed": "#dae2fd",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#0b1c30",
                    "on-primary-container": "#7c839b",
                    "on-primary-fixed-variant": "#3f465c",
                    "tertiary-fixed": "#d3e4fe",
                    "secondary-fixed-dim": "#b9c7e0",
                    "tertiary": "#000000",
                    "surface-container-high": "#e6e8ea",
                    "background": "#f7f9fb",
                    "on-surface-variant": "#45464d",
                    "surface": "#f7f9fb",
                    "on-surface": "#191c1e",
                    "primary": "#000000",
                    "on-tertiary-container": "#75859d",
                    "secondary-fixed": "#d5e3fd",
                    "surface-container-highest": "#e0e3e5",
                    "on-secondary-fixed": "#0d1c2f",
                    "outline-variant": "#c6c6cd",
                    "on-secondary-container": "#57657b",
                    "surface-bright": "#f7f9fb",
                    "surface-variant": "#e0e3e5",
                    "on-background": "#191c1e",
                    "secondary-container": "#d5e3fd",
                    "primary-fixed-dim": "#bec6e0",
                    "tertiary-fixed-dim": "#b7c8e1",
                    "on-tertiary": "#ffffff",
                    "primary-container": "#131b2e",
                    "on-error": "#ffffff",
                    "inverse-primary": "#bec6e0",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#eff1f3",
                    "surface-dim": "#d8dadc",
                    "surface-tint": "#565e74",
                    "surface-container": "#eceef0"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "row-height-standard": "40px",
                    "element-gap": "8px",
                    "container-padding": "16px",
                    "row-height-dense": "32px",
                    "base": "4px"
            },
            "fontFamily": {
                    "headline-sm": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "display-metric": ["Inter"],
                    "table-data": ["Inter"],
                    "label-caps": ["Inter"]
            },
            "fontSize": {
                    "headline-sm": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "display-metric": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "table-data": ["13px", {"lineHeight": "16px", "fontWeight": "450"}],
                    "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background">
<header class="bg-surface-container-lowest dark:bg-inverse-surface border-b border-outline-variant dark:border-outline flex justify-between items-center h-row-height-standard w-full px-container-padding sticky top-0 z-50">
<div class="flex items-center gap-6">
<div class="text-headline-sm font-headline-sm font-bold text-primary dark:text-inverse-primary tracking-tight">
                PulseLog Mini
            </div>
<nav class="hidden md:flex items-center gap-4 h-full pt-1">
<a class="text-primary dark:text-inverse-primary font-bold border-b-2 border-primary dark:border-inverse-primary pb-1 h-full flex items-center cursor-pointer hover:bg-surface-container-low dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80" href="#">
<span class="text-label-caps font-label-caps">Records</span>
</a>
<a class="text-secondary dark:text-on-secondary-container h-full flex items-center cursor-pointer hover:bg-surface-container-low dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80 px-2 rounded-t" href="#">
<span class="text-label-caps font-label-caps">Insights</span>
</a>
<a class="text-secondary dark:text-on-secondary-container h-full flex items-center cursor-pointer hover:bg-surface-container-low dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80 px-2 rounded-t" href="#">
<span class="text-label-caps font-label-caps">Settings</span>
</a>
</nav>
</div>
<div class="flex items-center gap-element-gap">
<button class="w-8 h-8 flex items-center justify-center rounded text-primary dark:text-inverse-primary hover:bg-surface-container-low dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80">
<span class="material-symbols-outlined text-[20px]" data-icon="notifications">notifications</span>
</button>
<button class="w-8 h-8 flex items-center justify-center rounded text-primary dark:text-inverse-primary hover:bg-surface-container-low dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80">
<span class="material-symbols-outlined text-[20px]" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="flex-grow flex justify-center py-8 px-container-padding">
<div class="w-full max-w-2xl">
<div class="flex items-center justify-between mb-6">
<div>
<h1 class="text-display-metric font-display-metric text-on-surface">Edit Record</h1>
<p class="text-body-sm font-body-sm text-secondary mt-1">REC-8492-A</p>
</div>
<div class="flex items-center gap-2 bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full h-[24px]">
<span class="material-symbols-outlined text-[14px]" data-icon="edit_note">edit_note</span>
<span class="text-label-caps font-label-caps">Unsaved Changes</span>
</div>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded shadow-sm p-6 mb-6">
<form class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-label-caps font-label-caps text-on-surface" for="record-name">Record Name <span class="text-error">*</span></label>
</div>
<div class="relative">
<input class="w-full h-row-height-dense px-3 bg-surface border border-error rounded text-body-md font-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-error transition-shadow" id="record-name" placeholder="Enter a descriptive name" type="text" value=""/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-error text-[16px]" data-icon="error">error</span>
</div>
</div>
<p class="text-body-sm font-body-sm text-error mt-1 flex items-center gap-1">
                            Record Name is required to save changes.
                        </p>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-label-caps font-label-caps text-on-surface" for="description">Description</label>
<span class="text-body-sm font-body-sm text-secondary">Optional</span>
</div>
<textarea class="w-full p-3 bg-surface border border-outline-variant rounded text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow resize-y min-h-[80px]" id="description" placeholder="Provide additional context or details..." rows="3">Weekly synchronization metrics and outlier detection logs for primary telemetry stream.</textarea>
</div>
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-surface" for="status">Status</label>
<div class="relative">
<select class="w-full h-row-height-dense px-3 pr-8 bg-surface border border-outline-variant rounded text-body-md font-body-md text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="status">
<option value="active">Active</option>
<option selected="" value="pending">Pending Review</option>
<option value="archived">Archived</option>
</select>
<div class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none text-secondary">
<span class="material-symbols-outlined text-[18px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</form>
</div>
<div class="flex items-center justify-end gap-3 pt-4 border-t border-outline-variant/50">
<button class="h-row-height-dense px-4 flex items-center justify-center rounded text-body-md font-headline-sm font-medium text-secondary hover:bg-surface-container-high transition-colors active:opacity-80" type="button">
                    Cancel
                </button>
<button class="h-row-height-dense px-6 flex items-center justify-center rounded bg-primary text-on-primary text-body-md font-headline-sm font-medium hover:bg-primary/90 transition-colors active:opacity-80 shadow-sm opacity-50 cursor-not-allowed" disabled="" type="button">
                    Save Record
                </button>
</div>
</div>
</main>
<footer class="bg-surface-container-low dark:bg-inverse-surface border-t border-outline-variant dark:border-outline flex justify-between items-center h-row-height-dense w-full px-container-padding mt-auto">
<div class="text-label-caps font-label-caps font-bold text-on-surface-variant dark:text-on-secondary-container">
            PulseLog Mini v1.0.4 • System Operational
        </div>
<nav class="flex items-center gap-4">
<a class="text-label-caps font-label-caps text-on-surface-variant dark:text-on-secondary-container hover:text-primary dark:hover:text-inverse-primary transition-opacity duration-150" href="#">
                Status
            </a>
<a class="text-label-caps font-label-caps text-on-surface-variant dark:text-on-secondary-container hover:text-primary dark:hover:text-inverse-primary transition-opacity duration-150" href="#">
                Documentation
            </a>
</nav>
</footer>
</body></html>
